<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Secure Logging System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-shield-alt text-6xl text-white mb-4"></i>
            <h1 class="text-3xl font-bold text-white mb-2">Admin Login</h1>
            <p class="text-gray-200">Secure Logging System</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-white mb-2"><i class="fas fa-user mr-2"></i>Username</label>
                <input type="text" id="username" required
                       class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg px-4 py-3 text-white placeholder-gray-300 focus:outline-none focus:border-white"
                       placeholder="Enter admin username">
            </div>
            
            <div>
                <label class="block text-white mb-2"><i class="fas fa-lock mr-2"></i>Password</label>
                <input type="password" id="password" required
                       class="w-full bg-white bg-opacity-20 border border-white border-opacity-30 rounded-lg px-4 py-3 text-white placeholder-gray-300 focus:outline-none focus:border-white"
                       placeholder="Enter admin password">
            </div>
            
            <button type="submit" class="w-full bg-white text-purple-600 font-bold py-3 rounded-lg hover:bg-gray-100 transition">
                <i class="fas fa-sign-in-alt mr-2"></i>Login as Admin
            </button>
        </form>
        
        <div id="error-message" class="mt-4 p-3 bg-red-500 bg-opacity-80 text-white rounded-lg hidden"></div>
        
        <div class="mt-6 text-center">
            <p class="text-white text-sm">
                <a href="/user/login" class="text-yellow-300 hover:underline">User Login</a>
            </p>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.classList.add('hidden');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                // Check if response is JSON or HTML (rate limit returns HTML sometimes)
                const contentType = response.headers.get('content-type');
                let data;
                
                if (contentType && contentType.includes('application/json')) {
                    data = await response.json();
                } else {
                    // Rate limit exceeded - return HTML, so we handle it manually
                    if (response.status === 429) {
                        errorDiv.textContent = 'Too many login attempts! Please wait 1 minute before trying again.';
                        errorDiv.classList.remove('hidden');
                        return;
                    }
                    // Other non-JSON response
                    throw new Error('Server returned invalid response');
                }
                
                if (response.ok) {
                    // Store admin token and redirect
                    if (data.access_token) {
                        localStorage.setItem('access_token', data.access_token);
                        console.log('Admin token stored successfully');
                        window.location.href = '/admin';
                    } else {
                        errorDiv.textContent = 'Login successful but no token received';
                        errorDiv.classList.remove('hidden');
                    }
                } else if (response.status === 429) {
                    // Rate limit exceeded
                    errorDiv.textContent = data.message || 'Too many login attempts! Please wait 1 minute before trying again.';
                    errorDiv.classList.remove('hidden');
                } else {
                    errorDiv.textContent = data.error || data.message || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                // Handle JSON parse errors (usually from rate limiting HTML response)
                if (error.message.includes('JSON') || error.message.includes('Unexpected token')) {
                    errorDiv.textContent = 'Too many login attempts! Please wait 1 minute before trying again.';
                } else {
                    errorDiv.textContent = 'Error: ' + error.message;
                }
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
